services:
  - type: web
    name: reguflow-api
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: ALLOW_MOCK_AUTH
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: reguflow-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STORAGE_DIR
        value: /opt/render/project/src/backend/storage

databases:
  - name: reguflow-db
    databaseName: reguflow
    user: reguflow_user
    region: singapore
    plan: free
